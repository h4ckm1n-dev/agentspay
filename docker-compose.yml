services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: agentspay
      POSTGRES_PASSWORD: agentspay
      POSTGRES_DB: agentspay
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentspay -d agentspay"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  gateway:
    build:
      context: .
      dockerfile: services/gateway/Dockerfile
    environment:
      RUST_LOG: agentspay_gateway=debug,tower_http=debug
      AGENTSPAY_ENVIRONMENT: sandbox
      AGENTSPAY_DATABASE_URL: postgres://agentspay:agentspay@postgres:5432/agentspay
      AGENTSPAY_REDIS_URL: redis://redis:6379
      AGENTSPAY_HTTP_ADDR: 0.0.0.0:8080
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    image: node:22-alpine
    working_dir: /workspace
    command: sh -c "corepack enable && pnpm install && pnpm --filter frontend dev --hostname 0.0.0.0"
    environment:
      NEXT_PUBLIC_AGENTSPAY_API_URL: http://localhost:8080
    ports:
      - "3000:3000"
    volumes:
      - .:/workspace
    depends_on:
      - gateway

volumes:
  postgres_data:
